<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- link a favicon -->
  <link rel = "icon" href = "/images/favicon-32x32.png">

  <title>Qr Code</title>


  <style>
    
    *{
       margin: 0;
       padding: 0;
    }
    
    body{
      background-color: hsl(212, 45%, 89%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
     
    }

    img{
      width: 100%;
      border-radius: 15px;
    }

    .qr-code-card{
      background-color: hsl(0, 0%, 100%);
      width: 300px;
      padding: 15px;
      padding-bottom: 40px;
      border-radius: 15px;
    }

    .qr-code-text{
      text-align: center;
      color: hsl(216, 15%, 48%);
      font-size: 15px;
    }

    h1{
      font-size: 25px;
      text-align: center;
      color:  hsl(218, 44%, 22%);
      margin: 10px 0px;
    }



  </style>


</head>
<body>

  <div class="qr-code-card">
    <img src="/images/image-qr-code.png" alt="qr code">



    <div>
      <h1  >Improve your front end <br> skills by building projects
      </h1>

      <p class="qr-code-text">
      Scan the QR code to visit Frontend <br> Mentor and take your coding skills to <br> the next level
      </p>
    </div>

  </div>


  
</body>
</html>
